<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUEENTRESS - Cosmic Universe</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app-container">
        <div id="splash-screen" class="screen active">
            <div class="splash-content"><h1 class="glow-text">QUEENTRESS</h1><div class="loading-pulse"></div></div>
        </div>

        <div id="profile-setup-screen" class="screen">
            <div class="glass-box">
                <h2 class="glow-text">Shape Your Universe</h2>
                <form onsubmit="event.preventDefault(); showScreen('universe-screen'); document.getElementById('main-bottom-nav').classList.remove('nav-hidden');">
                    <input type="text" class="input-field" placeholder="Cosmic Name" required>
                    <input type="date" class="input-field" required>
                    <button type="submit" class="btn-primary">Ignite Universe</button>
                </form>
            </div>
        </div>

        <div id="universe-screen" class="screen">
            <div class="map-container">
                <img src="assets/icons/universe-bg.jpg" alt="Universe Map" class="interactive-map">
                <div class="hotspot" style="top: 30%; left: 15%;" onclick="showScreen('memory-galaxy-screen')"><span class="hotspot-label">Memories</span></div>
                <div class="hotspot" style="top: 25%; left: 75%;" onclick="showScreen('time-capsule-screen')"><span class="hotspot-label">Time Vault</span></div>
            </div>
        </div>

        <div id="memory-galaxy-screen" class="screen"><h2>Memory Galaxy</h2><button onclick="showScreen('universe-screen')">Back</button></div>
        <div id="time-capsule-screen" class="screen"><h2>Time Vault</h2><button onclick="showScreen('universe-screen')">Back</button></div>

        <nav class="bottom-nav nav-hidden" id="main-bottom-nav">
            <div class="nav-item" onclick="showScreen('universe-screen')">🌌 Universe</div>
            <div class="nav-item" onclick="showScreen('memory-galaxy-screen')">⭐ Memories</div>
        </nav>
    </div>

    <script src="core/ui_manager.js"></script>
    <script src="app.js"></script>
</body>
</html>
