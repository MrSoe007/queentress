<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUEENTRESS</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app-container">
        <div id="splash-screen" class="screen active"><h1>QUEENTRESS</h1></div>

        <div id="profile-setup-screen" class="screen">
            <div class="glass-box">
                <h2>Shape Your Universe</h2>
                <form onsubmit="event.preventDefault(); showScreen('universe-screen'); document.getElementById('main-bottom-nav').style.display = 'flex';">
                    <input type="text" class="input-field" placeholder="Cosmic Name" required>
                    <input type="date" class="input-field" required>
                    <button type="submit" class="btn-primary">Ignite Universe</button>
                </form>
            </div>
        </div>

        <div id="universe-screen" class="screen">
            <div class="map-container">
                <img src="assets/images/universe-bg.jpg" alt="Map" class="interactive-map">
                <div class="hotspot" style="top: 35%; left: 20%;" onclick="alert('Coming Soon')"></div>
            </div>
        </div>

        <nav class="bottom-nav" id="main-bottom-nav" style="display: none;">
            <div onclick="showScreen('universe-screen')">🌌 Universe</div>
            <div onclick="alert('Full Version')">⭐ Memories</div>
        </nav>
    </div>
    <script src="core/ui_manager.js"></script>
    <script src="app.js"></script>
</body>
</html>
