<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUEENTRESS</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app-container">
        <div id="splash-screen" class="screen active">
            <h1 class="glow-text">QUEENTRESS</h1>
            <div class="loading-pulse"></div>
        </div>

        <div id="profile-setup-screen" class="screen">
            <div class="glass-box">
                <h2 class="glow-text">Shape Your Universe</h2>
                <form onsubmit="event.preventDefault(); showScreen('universe-screen'); document.getElementById('main-bottom-nav').style.display = 'flex';">
                    <input type="text" class="input-field" placeholder="Cosmic Name" required>
                    <input type="date" class="input-field" required>
                    <button type="submit" class="btn-primary">Ignite Universe</button>
                </form>
            </div>
        </div>

        <div id="universe-screen" class="screen">
            <div class="map-container">
                <img src="assets/icons/universe-bg.jpg" alt="Universe Map" class="interactive-map">
                <div class="hotspot" style="top: 35%; left: 20%;" onclick="alert('Memory Galaxy Coming Soon!')">
                    <span class="hotspot-label">Memories</span>
                </div>
                <div class="hotspot" style="top: 30%; left: 70%;" onclick="alert('Time Vault Coming Soon!')">
                    <span class="hotspot-label">Time Vault</span>
                </div>
            </div>
        </div>

        <nav class="bottom-nav" id="main-bottom-nav" style="display: none;">
            <div class="nav-item" onclick="showScreen('universe-screen')">🌌 Universe</div>
            <div class="nav-item" onclick="alert('Full Version Required')">⭐ Memories</div>
        </nav>
    </div>

    <script src="core/ui_manager.js"></script>
    <script src="app.js"></script>
</body>
</html>
